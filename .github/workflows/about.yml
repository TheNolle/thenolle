name: About

on:
  schedule:
    -  cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: pip install lxml

      - name: Fetch
        env:
          README_TOKEN: ${{ secrets.README_TOKEN }}
          GITHUB_LOGIN: TheNolle
        run: python scripts/about_fetch.py

      - name: Inject
        run: python scripts/about_inject.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/about.svg
          git diff --cached --quiet || git commit -m "chore: update about banner"
          git push